<!DOCTYPE html>
<html>
<head>
    <title>Блог — Регистрация и вход</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-container { max-width: 400px; margin: 0 auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .message { margin-top: 15px; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Регистрация</h2>
        <input type="text" id="reg-username" placeholder="Имя пользователя">
        <input type="password" id="reg-password" placeholder="Пароль">
        <button onclick="register()">Зарегистрироваться</button>

        <div id="reg-message"></div>

        <hr>

        <h2>Вход</h2>
        <input type="text" id="login-username" placeholder="Имя пользователя">
        <input type="password" id="login-password" placeholder="Пароль">
        <button onclick="login()">Войти</button>

        <div id="login-message"></div>
        <hr>
<h2>Новый пост</h2>
<div id="post-form">
    <input type="text" id="post-title" placeholder="Заголовок поста" required>
    <textarea id="post-content" placeholder="Содержание поста" rows="5" required></textarea>
    <input type="text" id="post-tags" placeholder="Теги (через запятую)">
    <select id="post-visibility">
        <option value="public">Публичный</option>
        <option value="private">Скрытый</option>
    </select>
    <button onclick="createPost()">Опубликовать пост</button>
</div>
<div id="post-message"></div>
        <hr>
<h2>Подписка на пользователей</h2>
<div id="follow-form">
    <input type="number" id="follower-id" placeholder="Ваш ID пользователя" required>
    <input type="number" id="following-id" placeholder="ID пользователя для подписки" required>
    <button onclick="followUser()">Подписаться</button>
    <button onclick="unfollowUser()">Отписаться</button>
</div>
<div id="follow-message"></div>


<div>
    <h3>Мои подписки</h3>
    <button onclick="loadSubscriptions()">Показать подписки</button>
    <div id="subscriptions-list"></div>
</div>

<div>
    <h3>Мои подписчики</h3>
    <button onclick="loadFollowers()">Показать подписчиков</button>
    <div id="followers-list"></div>
</div>
        <hr>
<h2>Лента подписок</h2>
<div>
    <input type="number" id="feed-user-id" placeholder="Ваш ID пользователя" required>
    <button onclick="loadUserFeed()">Загрузить ленту</button>
</div>
<div id="feed-message"></div>
<div id="feed-container"></div>

<hr>
<h2>Поиск пользователей для подписки</h2>
<button onclick="loadAllUsers()">Показать всех пользователей</button>
<div id="users-list"></div>
<hr>
<h2>Все публичные посты</h2>
<button onclick="loadPublicPosts()">Загрузить все посты</button>
<div id="public-posts-message"></div>
<div id="public-posts-container"></div>


<hr>
<h2>Поиск постов по тегам</h2>
<input type="text" id="search-tags" placeholder="Теги через запятую (python,web)">
<button onclick="searchPostsByTags()">Найти посты</button>
<div id="search-results-message"></div>
<div id="search-results-container"></div>
<hr>
<h2>Редактирование и удаление постов</h2>
<div id="edit-post-form">
    <input type="number" id="edit-post-id" placeholder="ID поста" required>
    <input type="text" id="edit-title" placeholder="Новый заголовок">
    <textarea id="edit-content" placeholder="Новое содержание" rows="4"></textarea>
    <input type="text" id="edit-tags" placeholder="Новые теги (через запятую)">
    <select id="edit-visibility">
        <option value="public">Публичный</option>
        <option value="private_request">Скрытый (по запросу)</option>
    </select>
    <button onclick="updatePost()">Обновить пост</button>
    <button onclick="deletePost()" style="background: #dc3545;">Удалить пост</button>
</div>
<div id="edit-post-message"></div>


<hr>
<h2>Посты конкретного пользователя</h2>
<input type="number" id="user-posts-id" placeholder="ID пользователя">
<button onclick="loadUserPublicPosts()">Показать посты пользователя</button>
<div id="user-posts-message"></div>
<div id="user-posts-container"></div>

        <hr>
<h2>Создать скрытый пост</h2>
<div id="private-post-form">
    <input type="text" id="

    </div>

    <script src="script.js"></script>
    
</body>
</html>
